version: '3.8'

services:
  florella:
    build: .
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - samsebweb_app-network

networks:
  samsebweb_app-network:
    external: true
